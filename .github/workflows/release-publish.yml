name: Release Publish

on:
  # Automatic trigger when Release Build completes
  workflow_run:
    workflows: ["Release Build"]
    types: [completed]

  # Manual trigger (fallback/override)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2026.2.1)'
        required: true
        type: string
      run_id:
        description: 'Release build workflow run ID'
        required: true
        type: string
      skip_sourceforge:
        description: 'Skip Sourceforge upload'
        required: false
        type: boolean
        default: false
      skip_docs_deploy:
        description: 'Skip API docs deployment'
        required: false
        type: boolean
        default: false

jobs:
  # ============================================
  # Check Trigger and Extract Parameters
  # ============================================

  check-trigger:
    name: Check Trigger and Extract Parameters
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.extract.outputs.version }}
      run_id: ${{ steps.extract.outputs.run_id }}

    steps:
      - name: Check workflow_run conclusion
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "🤖 Automatic trigger from Release Build workflow"

            BRANCH="${{ github.event.workflow_run.head_branch }}"
            if [ "$BRANCH" != "master" ] && ! echo "$BRANCH" | grep -qE '^v[0-9]'; then
              echo "❌ Release Build was on branch '$BRANCH' - skipping publish"
              echo "should_publish=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "❌ Release Build failed - skipping publish"
              echo "should_publish=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "✅ Release Build succeeded on '$BRANCH' - proceeding with publish"
          else
            echo "👤 Manual trigger - proceeding with publish"
          fi

          echo "should_publish=true" >> $GITHUB_OUTPUT

      - name: Extract version and run_id
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Automatic trigger - extract from workflow_run event
            VERSION="${{ github.event.workflow_run.head_branch }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix if present
            RUN_ID="${{ github.event.workflow_run.id }}"

            echo "📦 Automatic extraction:"
            echo "   Branch: ${{ github.event.workflow_run.head_branch }}"
            echo "   Version: $VERSION"
            echo "   Run ID: $RUN_ID"
          else
            # Manual trigger - use inputs
            VERSION="${{ github.event.inputs.version }}"
            RUN_ID="${{ github.event.inputs.run_id }}"

            echo "📦 Manual trigger:"
            echo "   Version: $VERSION"
            echo "   Run ID: $RUN_ID"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

  # ============================================
  # Download and Rename Artifacts
  # ============================================

  prepare:
    name: Prepare Release Assets
    needs: check-trigger
    if: needs.check-trigger.outputs.should_publish == 'true'
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          echo "version=${{ needs.check-trigger.outputs.version }}" >> $env:GITHUB_OUTPUT
          echo "📦 Release version: ${{ needs.check-trigger.outputs.version }}"

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          run-id: ${{ needs.check-trigger.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded artifacts
        shell: pwsh
        run: |
          Write-Output "📦 Downloaded artifacts:"
          Get-ChildItem -Path artifacts -Recurse | Format-Table Name, Length, LastWriteTime

      # ============================================
      # Build Binary Renaming Tool
      # ============================================

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build compiler
        working-directory: ./core/compiler
        shell: cmd
        run: call update_version.cmd

      - name: Build runtime
        working-directory: ./core/release
        shell: cmd
        run: deploy_windows.cmd x64

      - name: Build renaming tool
        working-directory: ./core/release/deploy-x64/bin
        shell: cmd
        run: |
          set OBJECK_LIB_PATH=%CD%\..\lib
          obc.exe -src ..\..\..\..\programs\deploy\util\deploy_rename.obs -dest deploy_rename.obe
          if errorlevel 1 exit /b 1
          echo ✅ Binary renaming tool compiled

      # ============================================
      # Rename All Binaries
      # ============================================

      - name: Rename binaries
        shell: pwsh
        run: |
          $version = "${{ needs.check-trigger.outputs.version }}"
          $renamer = "core\release\deploy-x64\bin\obr.exe"
          $renameScript = "core\release\deploy-x64\bin\deploy_rename.obe"

          # Create staging directory
          $stageDir = "release-staging"
          New-Item -ItemType Directory -Force -Path $stageDir

          # Copy only release artifacts to staging (exclude version-metadata, api-docs)
          Copy-Item -Path "artifacts\release-*\*" -Destination $stageDir -Recurse -Force

          # Run renaming tool
          Write-Output "🔄 Renaming binaries with version $version..."
          & $renamer $renameScript $stageDir $version

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Binary renaming failed"
            exit 1
          }

          Write-Output "✅ All binaries renamed"
          Get-ChildItem -Path $stageDir | Format-Table Name, Length

      # ============================================
      # Verify Code Signing (Windows Only)
      # ============================================

      - name: Verify MSI signatures
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $msiFiles = Get-ChildItem -Path "release-staging" -Filter "*.msi" -Recurse

          if ($msiFiles.Count -eq 0) {
            Write-Output "ℹ️  No MSI files found to verify"
            exit 0
          }

          foreach ($msi in $msiFiles) {
            Write-Output "🔍 Verifying signature: $($msi.Name)"

            signtool verify /pa $msi.FullName 2>$null

            if ($LASTEXITCODE -eq 0) {
              Write-Output "✅ Signed and verified: $($msi.Name)"
            } else {
              Write-Output "⚠️  Not signed: $($msi.Name) (signing is done locally after download)"
            }
          }

          exit 0

      # ============================================
      # Upload Renamed Artifacts
      # ============================================

      - name: Remove debug files from staging
        shell: pwsh
        run: |
          Get-ChildItem -Path "release-staging" -Filter "*.wixpdb" -Recurse | Remove-Item -Force
          Write-Output "✅ Removed .wixpdb debug files from release"

      - name: Upload renamed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-final
          path: release-staging/*
          retention-days: 30

  # ============================================
  # Create GitHub Release
  # ============================================

  github-release:
    name: Create GitHub Release
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download final artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-final
          path: release-final/

      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          # Find previous release tag for changelog link
          PREV_VERSION=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "v$VERSION" | head -n 1)
          PREV_VERSION="${PREV_VERSION#v}"

          cat > release-notes.md << 'EOF'
          # Objeck Language v$VERSION

          This release includes builds for Windows, Linux, and macOS platforms.

          ## 📦 Installation

          ### Windows
          - **x64**: Download `objeck-windows-x64_$VERSION.msi` and run the installer
          - **ARM64**: Download `objeck-windows-arm64_$VERSION.msi` and run the installer
          - **Portable**: Download `.zip` files for portable installations

          ### Linux
          - **x64**: `tar -xzf objeck-linux-x64_$VERSION.tgz`
          - **ARM64**: `tar -xzf objeck-linux-arm64_$VERSION.tgz`

          ### macOS
          - **ARM64 (M1/M2/M3)**: `tar -xzf objeck-macos-arm64_$VERSION.tgz`

          ### LSP (Language Server Protocol)
          - Download `objeck-lsp-$VERSION.zip` for IDE integration

          ## 📚 Documentation

          - **API Documentation**: https://objeck.org/api/latest/
          - **Language Guide**: https://github.com/objeck/objeck-lang

          ## 🔐 Verification

          All Windows MSI installers are digitally signed for security.

          ## 🐛 Issues

          Report issues at: https://github.com/objeck/objeck-lang/issues

          ---

          **Full Changelog**: https://github.com/objeck/objeck-lang/compare/v$PREV_VERSION...v$VERSION
          EOF

          sed -i "s/\$VERSION/$VERSION/g; s/\$PREV_VERSION/$PREV_VERSION/g" release-notes.md
          echo "✅ Release notes generated (changelog: v$PREV_VERSION → v$VERSION)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          # Create release
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release-notes.md \
            release-final/*

          echo "✅ GitHub Release created: https://github.com/${{ github.repository }}/releases/tag/v$VERSION"

  # ============================================
  # Upload to Sourceforge
  # ============================================

  sourceforge-upload:
    name: Upload to Sourceforge
    needs: [check-trigger, prepare, github-release]
    runs-on: ubuntu-latest
    if: |
      needs.check-trigger.outputs.should_publish == 'true' &&
      (github.event_name == 'workflow_run' || github.event.inputs.skip_sourceforge != 'true')
    env:
      SOURCEFORGE_SSH_KEY: ${{ secrets.SOURCEFORGE_SSH_KEY }}
      SOURCEFORGE_USERNAME: ${{ secrets.SOURCEFORGE_USERNAME }}

    steps:
      - name: Download final artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-final
          path: release-final/

      - name: Setup SSH key
        if: env.SOURCEFORGE_SSH_KEY != ''
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SOURCEFORGE_SSH_KEY }}" > ~/.ssh/sf_key
          chmod 600 ~/.ssh/sf_key

          # Add Sourceforge to known hosts
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts

      - name: Create release directory on Sourceforge
        if: env.SOURCEFORGE_SSH_KEY != ''
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          ssh -i ~/.ssh/sf_key \
            "${{ env.SOURCEFORGE_USERNAME }}@frs.sourceforge.net" \
            "mkdir -p /home/frs/project/objeck/v${VERSION}"

      - name: Upload to Sourceforge via SFTP
        if: env.SOURCEFORGE_SSH_KEY != ''
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          sftp -i ~/.ssh/sf_key \
            "${{ env.SOURCEFORGE_USERNAME }}@frs.sourceforge.net" << EOF
          cd /home/frs/project/objeck/v${VERSION}
          put release-final/*
          EOF

          echo "✅ Uploaded to Sourceforge: https://sourceforge.net/projects/objeck/files/v${VERSION}/"

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/sf_key

      - name: Skip notice
        if: env.SOURCEFORGE_SSH_KEY == ''
        run: |
          echo "⚠️  Sourceforge SSH key not configured. Skipping upload."
          echo "To enable: Add SOURCEFORGE_SSH_KEY and SOURCEFORGE_USERNAME secrets"

  # ============================================
  # Deploy API Documentation
  # ============================================

  deploy-docs:
    name: Deploy API Documentation
    needs: [check-trigger, prepare]
    runs-on: ubuntu-latest
    if: |
      needs.check-trigger.outputs.should_publish == 'true' &&
      (github.event_name == 'workflow_run' || github.event.inputs.skip_docs_deploy != 'true')
    env:
      OBJECK_ORG_SSH_KEY: ${{ secrets.OBJECK_ORG_SSH_KEY }}
      OBJECK_ORG_USER: ${{ secrets.OBJECK_ORG_USER }}

    steps:
      - name: Download API docs
        uses: actions/download-artifact@v4
        with:
          name: api-docs
          path: api-docs/
          run-id: ${{ needs.check-trigger.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API documentation
        run: |
          unzip api-docs/api.zip -d api-temp
          echo "✅ API documentation extracted"

      - name: Setup SSH key for objeck.org
        if: env.OBJECK_ORG_SSH_KEY != ''
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OBJECK_ORG_SSH_KEY }}" > ~/.ssh/obj_key
          chmod 600 ~/.ssh/obj_key

          # Add objeck.org to known hosts (replace with actual host)
          # ssh-keyscan objeck.org >> ~/.ssh/known_hosts

      - name: Deploy to objeck.org
        if: env.OBJECK_ORG_SSH_KEY != ''
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          # Upload versioned docs
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/obj_key -o StrictHostKeyChecking=no" \
            api-temp/api/ \
            "${{ env.OBJECK_ORG_USER }}@objeck.org:/var/www/objeck.org/api/v${VERSION}/"

          # Update 'latest' symlink
          ssh -i ~/.ssh/obj_key -o StrictHostKeyChecking=no \
            "${{ env.OBJECK_ORG_USER }}@objeck.org" \
            "cd /var/www/objeck.org/api && ln -sfn v${VERSION} latest"

          echo "✅ API docs deployed:"
          echo "   - https://objeck.org/api/v${VERSION}/"
          echo "   - https://objeck.org/api/latest/"

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/obj_key

      - name: Skip notice
        if: env.OBJECK_ORG_SSH_KEY == ''
        run: |
          echo "⚠️  objeck.org SSH key not configured. Skipping deployment."
          echo "To enable: Add OBJECK_ORG_SSH_KEY and OBJECK_ORG_USER secrets"

  # ============================================
  # Release Summary
  # ============================================

  summary:
    name: Release Summary
    needs: [check-trigger, prepare, github-release, sourceforge-upload, deploy-docs]
    runs-on: ubuntu-latest
    if: always() && needs.check-trigger.outputs.should_publish == 'true'

    steps:
      - name: Generate summary
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          echo "# 🎉 Release v$VERSION Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Release: ${{ needs.github-release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Sourceforge: ${{ needs.sourceforge-upload.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- API Docs: ${{ needs.deploy-docs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.github-release.result }}" = "success" ]; then
            echo "## 📦 Downloads" >> $GITHUB_STEP_SUMMARY
            echo "- **GitHub**: https://github.com/${{ github.repository }}/releases/tag/v$VERSION" >> $GITHUB_STEP_SUMMARY
            echo "- **Sourceforge**: https://sourceforge.net/projects/objeck/files/v$VERSION/" >> $GITHUB_STEP_SUMMARY
            echo "- **API Docs**: https://objeck.org/api/v$VERSION/" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Release complete!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Release failed. Please review logs.**" >> $GITHUB_STEP_SUMMARY
          fi
