name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2026.2.1)'
        required: true
        type: string

jobs:
  # ============================================
  # Prepare Release Metadata
  # ============================================

  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_number: ${{ steps.version.outputs.version_number }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Generate version number (remove dots and non-numeric suffixes)
          # Extract only numeric and dot parts (e.g., "2026.2.1-test" -> "2026.2.1")
          VERSION_NUMERIC=$(echo "$VERSION" | sed 's/[^0-9.].*$//')
          VERSION_NUMBER=$(echo "$VERSION_NUMERIC" | tr -d '.')
          echo "version_number=$VERSION_NUMBER" >> $GITHUB_OUTPUT

          echo "📦 Release version: $VERSION"
          echo "📊 Version number: $VERSION_NUMBER"

      - name: Update version files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUMBER="${{ steps.version.outputs.version_number }}"
          VERSION_WINDOWS=$(echo "$VERSION" | tr '.' ',')

          # Extract year from version
          YEAR=$(echo "$VERSION" | cut -d'.' -f1)

          # Update version.h
          cat > core/shared/version.h << EOF
          #pragma once

          #include "instrs.h"
          #include "traps.h"

          #define MAGIC_NUM_EXE 0xffbe // bitmask 'e'
          #define MAGIC_NUM_LIB 0xffb6 // bitmask 'k'

          #define VER_NUM $VERSION_NUMBER
          #define VERSION_STRING L"$VERSION"
          EOF

          echo "✅ Updated version.h with version $VERSION"

      - name: Upload version metadata
        uses: actions/upload-artifact@v6
        with:
          name: version-metadata
          path: core/shared/version.h
          retention-days: 1

  # ============================================
  # Build All Platforms in Parallel
  # ============================================

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - platform: windows-x64
            os: windows-latest
            arch: x64
            deploy_script: deploy_windows.cmd x64 deploy
            shell: cmd
            artifact_pattern: "objeck-windows-x64_0.0.0.*"

          # Windows ARM64 (cross-compiled on x64 runner)
          - platform: windows-arm64
            os: windows-latest
            arch: ARM64
            deploy_script: deploy_windows.cmd arm64 deploy
            shell: cmd
            artifact_pattern: "objeck-windows-arm64_0.0.0.*"

          # Linux x64
          - platform: linux-x64
            os: ubuntu-latest
            arch: x64
            deploy_script: ./deploy_posix.sh x64 deploy
            shell: bash
            artifact_pattern: "objeck-linux-x64_0.0.0.tgz"

          # Linux ARM64 - using GitHub-hosted ARM64 runners (now GA)
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            arch: arm64
            deploy_script: ./deploy_posix.sh arm64 deploy
            shell: bash
            artifact_pattern: "objeck-linux-arm64_0.0.0.tgz"

          # macOS ARM64
          - platform: macos-arm64
            os: macos-15
            arch: arm64
            deploy_script: ./deploy_macos_arm64.sh deploy
            shell: bash
            artifact_pattern: "objeck-macos-arm64_0.0.0.tgz"

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download version metadata
        uses: actions/download-artifact@v4
        with:
          name: version-metadata
          path: core/shared/

      # ============================================
      # Install Dependencies (Same as CI)
      # ============================================

      - name: Cache APT packages (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-${{ matrix.arch }}-apt-release
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-apt-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libopencv-dev \
            libmbedtls-dev \
            libnghttp2-dev \
            unixodbc-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libsdl2-mixer-dev \
            libreadline-dev \
            libeigen3-dev \
            libmp3lame-dev

      - name: Cache Homebrew (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
          key: ${{ runner.os }}-brew-release
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install opencv mbedtls nghttp2 unixodbc sdl2 sdl2_image sdl2_ttf sdl2_mixer readline eigen lame
          brew cleanup

      - name: Select Xcode 16.3+ (macOS)
        if: runner.os == 'macOS'
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.[3-9]*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
          fi
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
            echo "Selected: $XCODE_PATH"
          fi
          xcodebuild -version

      - name: Setup Visual Studio (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v3

      - name: Setup MSVC Environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install nghttp2 and mbedtls via vcpkg
          vcpkg install nghttp2:${{ matrix.arch }}-windows mbedtls:${{ matrix.arch }}-windows

          # Set include/lib paths for Visual Studio
          $vcpkgRoot = "C:\vcpkg\installed\${{ matrix.arch }}-windows"
          echo "INCLUDE=$vcpkgRoot\include;$env:INCLUDE" >> $env:GITHUB_ENV
          echo "LIB=$vcpkgRoot\lib;$env:LIB" >> $env:GITHUB_ENV

          # Copy nghttp2.dll to deploy bin so obr can load it at runtime
          $arch = "${{ matrix.arch }}".ToLower()
          $target = if ("${{ matrix.arch }}" -eq "ARM64") { "deploy-arm64" } else { "deploy-x64" }
          New-Item -ItemType Directory -Force -Path "core\release\$target\bin" | Out-Null
          Copy-Item "$vcpkgRoot\bin\nghttp2.dll" "core\release\$target\bin\" -ErrorAction SilentlyContinue
          Write-Output "✅ Installed nghttp2 and mbedtls for ${{ matrix.arch }}"
          Write-Output "Set INCLUDE=$vcpkgRoot\include"
          Write-Output "Set LIB=$vcpkgRoot\lib"

      - name: Cache OpenCV DLLs (Windows x64)
        if: matrix.platform == 'windows-x64'
        id: opencv-cache
        uses: actions/cache@v5
        with:
          path: core/lib/opencv/win/x64/bin
          key: opencv-4.12.0-win-x64-dlls

      - name: Download OpenCV runtime DLLs (Windows x64)
        if: matrix.platform == 'windows-x64' && steps.opencv-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $opencvVersion = "4.12.0"
          $binDir = "core\lib\opencv\win\x64\bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null

          $url = "https://github.com/opencv/opencv/releases/download/$opencvVersion/opencv-$opencvVersion-windows.exe"
          Write-Output "Downloading OpenCV $opencvVersion from $url ..."
          Invoke-WebRequest -Uri $url -OutFile opencv-dl.exe

          7z x opencv-dl.exe -oopencv-extract -y | Out-Null

          Copy-Item "opencv-extract\opencv\build\x64\vc16\bin\opencv_world4120.dll" $binDir
          Copy-Item "opencv-extract\opencv\build\x64\vc16\bin\opencv_videoio_ffmpeg4120_64.dll" $binDir

          Remove-Item opencv-dl.exe -Force
          Remove-Item -Recurse opencv-extract -Force

          Write-Output "OpenCV DLLs installed:"
          Get-ChildItem $binDir

      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add --global WixToolset.UI.wixext/5.0.2 WixToolset.Util.wixext/5.0.2
          Write-Output "✅ WiX Toolset installed"

      # ============================================
      # Build Full Release
      # Note: Bootstrap is skipped because version.h is already updated by prepare job
      # ============================================

      - name: Build release
        working-directory: ./core/release
        run: ${{ matrix.deploy_script }}

      - name: Verify required binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = if ("${{ matrix.arch }}" -eq "ARM64") { "deploy-arm64" } else { "deploy-x64" }
          $binDir = "core\release\$target\bin"
          $required = @("obr.exe", "obc.exe", "obd.exe", "obi.exe", "obb.exe")
          $missing = @()
          foreach ($bin in $required) {
            if (-not (Test-Path "$binDir\$bin")) { $missing += $bin }
          }
          if ($missing.Count -gt 0) {
            Write-Error "❌ Missing binaries in $binDir`: $($missing -join ', ')"
            exit 1
          }
          Write-Output "✅ All required binaries present in $binDir"
          $apiDir = "core\release\$target\doc\api"
          $htmlCount = (Get-ChildItem -Path $apiDir -Filter "*.html" -Recurse -ErrorAction SilentlyContinue).Count
          if ($htmlCount -lt 50) {
            Write-Error "❌ API docs incomplete in $apiDir`: only $htmlCount HTML files (expected 50+)"
            exit 1
          }
          Write-Output "✅ API docs complete: $htmlCount HTML files"

      - name: Verify required binaries (POSIX)
        if: runner.os != 'Windows'
        run: |
          DEPLOY_DIR="core/release/deploy"
          REQUIRED="obr obc obd obi obb"
          MISSING=""
          for bin in $REQUIRED; do
            [ -f "$DEPLOY_DIR/bin/$bin" ] || MISSING="$MISSING $bin"
          done
          if [ -n "$MISSING" ]; then
            echo "❌ Missing binaries in $DEPLOY_DIR/bin:$MISSING"
            exit 1
          fi
          echo "✅ All required binaries present in $DEPLOY_DIR/bin"
          HTML_COUNT=$(find "$DEPLOY_DIR/doc/api" -name "*.html" 2>/dev/null | wc -l)
          if [ "$HTML_COUNT" -lt 50 ]; then
            echo "❌ API docs incomplete in $DEPLOY_DIR/doc/api: only $HTML_COUNT HTML files (expected 50+)"
            exit 1
          fi
          echo "✅ API docs complete: $HTML_COUNT HTML files"

      # ============================================
      # Code Signing (Windows)
      # ============================================

      - name: Sign release artifacts (Windows)
        if: runner.os == 'Windows' && matrix.platform != 'windows-arm64'
        shell: pwsh
        env:
          CODESIGN_CERT_BASE64: ${{ secrets.CODESIGN_CERT_BASE64 }}
          CODESIGN_PASSWORD: ${{ secrets.CODESIGN_PASSWORD }}
        run: |
          if (-not $env:CODESIGN_CERT_BASE64 -or -not $env:CODESIGN_PASSWORD) {
            Write-Output "Code signing secrets not configured - skipping"
            exit 0
          }

          # Decode certificate
          $certPath = "$env:RUNNER_TEMP\codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:CODESIGN_CERT_BASE64))

          # Find MSI files to sign
          $buildDir = "$env:GITHUB_WORKSPACE\Objeck-Build"
          $msiFiles = Get-ChildItem -Path $buildDir -Recurse -Filter "*.msi" -ErrorAction SilentlyContinue

          foreach ($msi in $msiFiles) {
            Write-Output "Signing: $($msi.FullName)"
            & signtool sign /f $certPath /p $env:CODESIGN_PASSWORD /tr http://timestamp.sectigo.com /td sha256 /fd sha256 $msi.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Signing failed for $($msi.Name) - continuing without signature"
            } else {
              Write-Output "Signed: $($msi.Name)"
            }
          }

          # Sign EXE files in deploy directories
          $exeFiles = Get-ChildItem -Path $buildDir -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.DirectoryName -like "*\bin" }

          foreach ($exe in $exeFiles) {
            Write-Output "Signing: $($exe.FullName)"
            & signtool sign /f $certPath /p $env:CODESIGN_PASSWORD /tr http://timestamp.sectigo.com /td sha256 /fd sha256 $exe.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Signing failed for $($exe.Name) - continuing"
            }
          }

          # Clean up certificate
          Remove-Item $certPath -Force

          # Don't fail the build if signing fails
          exit 0

      # ============================================
      # macOS .pkg Installer + Signing + Notarization
      # ============================================

      - name: Install Apple signing certificate (macOS)
        if: matrix.platform == 'macos-arm64'
        env:
          APPLE_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_BASE64 }}
          APPLE_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
          APPLE_APP_CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_APP_CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_INSTALLER_CERT_BASE64" ]; then
            echo "Apple installer certificate not configured - .pkg will be unsigned"
            exit 0
          fi

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import Developer ID Installer certificate
          CERT_PATH=$RUNNER_TEMP/installer_cert.p12
          echo -n "$APPLE_INSTALLER_CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -P "$APPLE_INSTALLER_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          # Import Developer ID Application certificate (for binary signing)
          if [ -n "$APPLE_APP_CERT_BASE64" ]; then
            APP_CERT_PATH=$RUNNER_TEMP/app_cert.p12
            echo -n "$APPLE_APP_CERT_BASE64" | base64 --decode -o "$APP_CERT_PATH"
            security import "$APP_CERT_PATH" -P "$APPLE_APP_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            rm "$APP_CERT_PATH"
          fi

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "Certificates installed."

      - name: Create macOS .pkg installer
        if: matrix.platform == 'macos-arm64'
        working-directory: ./core/release
        env:
          APPLE_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          chmod +x create_macos_pkg.sh

          # Determine signing identity
          SIGN_ID=""
          if [ -n "$APPLE_INSTALLER_CERT_BASE64" ]; then
            SIGN_ID=$(security find-identity -v -p basic "$SIGNING_KEYCHAIN" 2>/dev/null | grep "Developer ID Installer" | head -1 | sed 's/.*"\(.*\)".*/\1/' || true)
            if [ -n "$SIGN_ID" ]; then
              echo "Found installer identity: $SIGN_ID"
            else
              echo "Warning: Installer certificate imported but identity not found"
            fi
          fi

          # Determine notarization
          NOTARIZE_FLAG=""
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$APPLE_APP_PASSWORD" ]; then
            NOTARIZE_FLAG="notarize"
          fi

          OUTPUT_DIR=~/Desktop ./create_macos_pkg.sh "$VERSION" "$SIGN_ID" "$NOTARIZE_FLAG"

          echo "macOS .pkg created:"
          ls -lh ~/Desktop/objeck-macos-arm64_*.pkg || true

      - name: Clean up macOS keychain
        if: matrix.platform == 'macos-arm64' && always()
        run: |
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          fi

      # ============================================
      # Find and Upload Artifacts
      # ============================================

      - name: Find release artifacts (Windows)
        if: runner.os == 'Windows'
        id: artifacts-win
        shell: pwsh
        run: |
          $buildDir = "$env:GITHUB_WORKSPACE\Objeck-Build"
          $files = Get-ChildItem -Path $buildDir -Recurse -Include ${{ matrix.artifact_pattern }}

          if ($files.Count -eq 0) {
            Write-Error "No artifacts found matching pattern: ${{ matrix.artifact_pattern }}"
            exit 1
          }

          # Collect all matching file paths (newline-separated for multi-path upload)
          $paths = @()
          foreach ($file in $files) {
            Write-Output "Found: $($file.FullName)"
            $paths += $file.FullName
          }

          # Write multiline output for upload step
          $pathsStr = $paths -join "`n"
          echo "artifact_paths<<EOF" >> $env:GITHUB_OUTPUT
          echo $pathsStr >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      - name: Find release artifacts (POSIX)
        if: runner.os != 'Windows'
        id: artifacts-posix
        shell: bash
        run: |
          ARTIFACT=$(find ~/Desktop -name "${{ matrix.artifact_pattern }}" -type f | head -n 1)

          if [ -z "$ARTIFACT" ]; then
            echo "❌ No artifacts found matching pattern: ${{ matrix.artifact_pattern }}"
            exit 1
          fi

          echo "✅ Found: $ARTIFACT"

          # For macOS, also include .pkg installer if it exists
          ALL_PATHS="$ARTIFACT"
          if [ "${{ matrix.platform }}" = "macos-arm64" ]; then
            PKG=$(find ~/Desktop -name "objeck-macos-arm64_*.pkg" -type f | head -n 1)
            if [ -n "$PKG" ]; then
              echo "✅ Found .pkg: $PKG"
              ALL_PATHS="$ARTIFACT"$'\n'"$PKG"
            fi
          fi

          echo "artifact_paths<<EOF" >> $GITHUB_OUTPUT
          echo "$ALL_PATHS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.platform }}
          path: |
            ${{ runner.os == 'Windows' && steps.artifacts-win.outputs.artifact_paths || steps.artifacts-posix.outputs.artifact_paths }}
          retention-days: 7

  # ============================================
  # Build LSP Package
  # ============================================

  build-lsp:
    name: Build LSP Package
    needs: prepare
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download version metadata
        uses: actions/download-artifact@v4
        with:
          name: version-metadata
          path: core/shared/

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v3

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Windows dependencies
        shell: pwsh
        run: |
          vcpkg install nghttp2:x64-windows mbedtls:x64-windows
          $vcpkgRoot = "C:\vcpkg\installed\x64-windows"
          echo "INCLUDE=$vcpkgRoot\include;$env:INCLUDE" >> $env:GITHUB_ENV
          echo "LIB=$vcpkgRoot\lib;$env:LIB" >> $env:GITHUB_ENV
          Write-Output "✅ Installed nghttp2 and mbedtls for x64"

      - name: Build LSP
        working-directory: ./core/release
        shell: cmd
        run: deploy_windows.cmd x64

      - name: Package LSP
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $lspDir = "objeck-lsp"

          # Create LSP directory structure
          New-Item -ItemType Directory -Force -Path $lspDir
          New-Item -ItemType Directory -Force -Path "$lspDir\bin"
          New-Item -ItemType Directory -Force -Path "$lspDir\lib"

          # Copy LSP binaries (compiler and runtime)
          Copy-Item "core\release\deploy-x64\bin\obc.exe" "$lspDir\bin\"
          Copy-Item "core\release\deploy-x64\bin\obr.exe" "$lspDir\bin\"
          Copy-Item "core\release\deploy-x64\lib\*.obl" "$lspDir\lib\"
          Copy-Item "core\release\deploy-x64\lib\*.ini" "$lspDir\lib\"

          # Create ZIP
          Compress-Archive -Path $lspDir -DestinationPath "objeck-lsp_0.0.0.zip"

          Write-Output "✅ LSP package created: objeck-lsp_0.0.0.zip"

      - name: Upload LSP artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-lsp
          path: objeck-lsp_0.0.0.zip
          retention-days: 7

  # ============================================
  # Generate API Documentation
  # ============================================

  build-docs:
    name: Generate API Docs
    needs: prepare
    runs-on: ubuntu-latest
    # Skip for pre-release builds (test, rc, beta, alpha, etc.)
    # Pre-compiled libraries won't match pre-release versions
    # Only generate docs for official releases (no hyphen in version)
    if: "!contains(needs.prepare.outputs.version, '-')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download version metadata
        uses: actions/download-artifact@v4
        with:
          name: version-metadata
          path: core/shared/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libopencv-dev \
            libmbedtls-dev \
            unixodbc-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libsdl2-mixer-dev \
            libreadline-dev \
            libeigen3-dev \
            libmp3lame-dev \
            libnghttp2-dev \
            libngtcp2-dev \
            libngtcp2-crypto-gnutls-dev \
            libnghttp3-dev \
            libgnutls28-dev

      - name: Build compiler and runtime
        run: |
          cd core/release
          ./deploy_posix.sh x64

      - name: Recompile standard libraries
        working-directory: ./core/compiler
        run: |
          echo "Recompiling standard libraries with new compiler (update_version.sh)..."
          chmod +x update_version.sh
          ./update_version.sh
          echo "✅ Standard libraries recompiled"

          # Copy freshly compiled libraries to deploy directory
          cp ../lib/*.obl ../release/deploy/lib/
          echo "✅ Libraries copied to deploy"

      - name: Generate API documentation
        working-directory: ./core/release/deploy/bin
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          export OBJECK_LIB_PATH=$(pwd)/../lib

          mkdir -p ../../../../docs/api

          ./obc -src ../../../lib/code_doc/doc_html.obs,../../../lib/code_doc/doc_parser.obs \
            -lib cipher,json,xml,misc,net -dest code_doc.obe

          ./obr code_doc.obe \
            ../../../lib/code_doc/templates \
            "$VERSION" \
            ../../../compiler/lib_src/lang.obs \
            ../../../compiler/lib_src/regex.obs \
            ../../../compiler/lib_src/json_stream.obs \
            ../../../compiler/lib_src/json.obs \
            ../../../compiler/lib_src/xml.obs \
            ../../../compiler/lib_src/cipher.obs \
            ../../../compiler/lib_src/odbc.obs \
            ../../../compiler/lib_src/csv.obs \
            ../../../compiler/lib_src/query.obs \
            ../../../compiler/lib_src/sdl2.obs \
            ../../../compiler/lib_src/sdl_game.obs \
            ../../../compiler/lib_src/gen_collect.obs \
            ../../../compiler/lib_src/net_common.obs \
            ../../../compiler/lib_src/net.obs \
            ../../../compiler/lib_src/net_secure.obs \
            ../../../compiler/lib_src/net_server.obs \
            ../../../compiler/lib_src/rss.obs \
            ../../../compiler/lib_src/misc.obs \
            ../../../compiler/lib_src/diags.obs \
            ../../../compiler/lib_src/ml.obs \
            ../../../compiler/lib_src/openai.obs \
            ../../../compiler/lib_src/gemini.obs \
            ../../../compiler/lib_src/ollama.obs \
            ../../../compiler/lib_src/json_rpc.obs \
            ../../../compiler/lib_src/opencv.obs \
            ../../../compiler/lib_src/onnx.obs \
            ../../../compiler/lib_src/nlp.obs \
            ../../../compiler/lib_src/lame.obs

      - name: Package API documentation
        working-directory: ./docs
        run: |
          zip -r api.zip api/
          HTML_COUNT=$(unzip -l api.zip | grep -c "\.html$" || true)
          if [ "$HTML_COUNT" -lt 50 ]; then
            echo "❌ API docs incomplete: only $HTML_COUNT HTML files (expected 50+)"
            exit 1
          fi
          echo "✅ API documentation packaged: $HTML_COUNT HTML files"

      - name: Commit api.zip to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout master
          cp docs/api.zip docs/api.zip
          git add docs/api.zip
          git diff --cached --quiet && echo "api.zip unchanged" || \
            git commit -m "chore: update api.zip for v${{ needs.prepare.outputs.version }} [skip ci]"
          git push origin master || echo "Push skipped (no changes)"

      - name: Upload API docs
        uses: actions/upload-artifact@v6
        with:
          name: api-docs
          path: docs/api.zip
          retention-days: 7

  # ============================================
  # Release Summary
  # ============================================

  summary:
    name: Build Summary
    needs: [prepare, build, build-lsp, build-docs]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate build summary
        run: |
          echo "# 🚀 Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Number:** ${{ needs.prepare.outputs.version_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- Windows x64: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Windows ARM64: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Linux x64: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Linux ARM64: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- macOS ARM64: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- LSP Package: ${{ needs.build-lsp.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- API Docs: ${{ needs.build-docs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build.result }}" = "success" ] && \
             [ "${{ needs.build-lsp.result }}" = "success" ] && \
             [ "${{ needs.build-docs.result }}" = "success" ]; then
            echo "✅ **All builds completed successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Next step: Run release-publish workflow to create GitHub Release" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some builds failed. Please review logs.**" >> $GITHUB_STEP_SUMMARY
          fi
