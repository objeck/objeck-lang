name: CI Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows builds
          - platform: windows-x64
            os: windows-latest
            arch: x64
            deploy_script: deploy_windows.cmd x64
            shell: cmd

          - platform: windows-arm64
            os: windows-latest
            arch: ARM64
            deploy_script: deploy_windows.cmd arm64
            shell: cmd

          # Linux builds
          - platform: linux-x64
            os: ubuntu-latest
            arch: x64
            deploy_script: ./deploy_posix.sh x64
            shell: bash

          # Linux ARM64 - using GitHub-hosted ARM64 runners (public preview)
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            arch: arm64
            deploy_script: ./deploy_posix.sh arm64
            shell: bash

          # macOS build (ARM64 native on Apple Silicon)
          - platform: macos-arm64
            os: macos-15
            arch: arm64
            deploy_script: ./deploy_macos_arm64.sh
            shell: bash

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    # ============================================
    # Dependency Installation
    # ============================================

    # Linux dependencies with caching
    - name: Cache APT packages (Linux)
      if: runner.os == 'Linux'
      uses: actions/cache@v5
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-${{ matrix.arch }}-apt-${{ hashFiles('.github/workflows/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.arch }}-apt-

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libopencv-dev \
          libmbedtls-dev \
          unixodbc-dev \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-ttf-dev \
          libsdl2-mixer-dev \
          libreadline-dev \
          libeigen3-dev \
          libmp3lame-dev \
          ccache \
          expect
        sudo chmod -R a+r /var/cache/apt/archives

    # macOS dependencies with caching
    - name: Cache Homebrew downloads (macOS)
      if: runner.os == 'macOS'
      uses: actions/cache@v5
      with:
        path: ~/Library/Caches/Homebrew
        key: ${{ runner.os }}-brew-downloads-${{ hashFiles('.github/workflows/**') }}
        restore-keys: |
          ${{ runner.os }}-brew-downloads-

    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      run: |
        brew install \
          opencv \
          mbedtls \
          unixodbc \
          sdl2 \
          sdl2_image \
          sdl2_ttf \
          sdl2_mixer \
          readline \
          eigen \
          lame \
          ccache
        brew cleanup

        # Add Homebrew bin to PATH (immediate + persistent)
        export PATH="/opt/homebrew/bin:$PATH"
        echo "/opt/homebrew/bin" >> $GITHUB_PATH

    - name: Select Xcode 16.3+ (macOS)
      if: runner.os == 'macOS'
      run: |
        # objectVersion 90 (matrix.xcodeproj) requires Xcode 16.3+
        XCODE_PATH=$(ls -d /Applications/Xcode_16.[3-9]*.app 2>/dev/null | sort -V | tail -1)
        if [ -z "$XCODE_PATH" ]; then
          XCODE_PATH=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
        fi
        if [ -n "$XCODE_PATH" ]; then
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          echo "Selected: $XCODE_PATH"
        fi
        xcodebuild -version

    - name: Install Apple signing certificate
      if: runner.os == 'macOS'
      env:
        CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        if [ -z "$CERTIFICATE_BASE64" ] || [ -z "$P12_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
          echo "Apple signing secrets not configured - skipping"
          exit 0
        fi

        CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
        echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" \
          -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: \
          -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychains -d user -s $KEYCHAIN_PATH

        rm "$CERTIFICATE_PATH"
        echo "Apple signing certificate installed."

    # Windows setup
    - name: Setup Visual Studio (Windows)
      if: runner.os == 'Windows'
      uses: microsoft/setup-msbuild@v3

    - name: Setup MSVC Environment (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}

    - name: Install Windows dependencies
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # Install mbedtls via vcpkg for crypto library
        vcpkg install mbedtls:${{ matrix.arch }}-windows

        # Set include/lib paths for Visual Studio
        $vcpkgRoot = "C:\vcpkg\installed\${{ matrix.arch }}-windows"
        echo "INCLUDE=$vcpkgRoot\include;$env:INCLUDE" >> $env:GITHUB_ENV
        echo "LIB=$vcpkgRoot\lib;$env:LIB" >> $env:GITHUB_ENV

        Write-Output "✅ Installed mbedtls for ${{ matrix.arch }}"
        Write-Output "Set INCLUDE=$vcpkgRoot\include"
        Write-Output "Set LIB=$vcpkgRoot\lib"

    - name: Cache OpenCV DLLs (Windows x64)
      if: matrix.platform == 'windows-x64'
      id: opencv-cache
      uses: actions/cache@v5
      with:
        path: core/lib/opencv/win/x64/bin
        key: opencv-4.12.0-win-x64-dlls

    - name: Download OpenCV runtime DLLs (Windows x64)
      if: matrix.platform == 'windows-x64' && steps.opencv-cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $opencvVersion = "4.12.0"
        $binDir = "core\lib\opencv\win\x64\bin"
        New-Item -ItemType Directory -Force -Path $binDir | Out-Null

        $url = "https://github.com/opencv/opencv/releases/download/$opencvVersion/opencv-$opencvVersion-windows.exe"
        Write-Output "Downloading OpenCV $opencvVersion from $url ..."
        Invoke-WebRequest -Uri $url -OutFile opencv-dl.exe

        7z x opencv-dl.exe -oopencv-extract -y | Out-Null

        Copy-Item "opencv-extract\opencv\build\x64\vc16\bin\opencv_world4120.dll" $binDir
        Copy-Item "opencv-extract\opencv\build\x64\vc16\bin\opencv_videoio_ffmpeg4120_64.dll" $binDir

        Remove-Item opencv-dl.exe -Force
        Remove-Item -Recurse opencv-extract -Force

        Write-Output "OpenCV DLLs installed:"
        Get-ChildItem $binDir

    # ============================================
    # ccache Setup
    # ============================================

    - name: Cache ccache
      if: runner.os != 'Windows'
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-${{ matrix.arch }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.arch }}-ccache-

    - name: Setup ccache
      if: runner.os != 'Windows'
      run: |
        which ccache || { echo "ccache not found in PATH"; exit 1; }
        ccache --max-size=500M
        ccache --set-config=compression=true
        ccache --zero-stats

    # ============================================
    # Build Compiler Bootstrap (Linux x64 only)
    # ============================================

    - name: Build bootstrap (Linux x64 only)
      if: matrix.platform == 'linux-x64'
      working-directory: ./core/compiler
      run: ./update_version.sh

    # ============================================
    # Build Toolchain
    # ============================================

    - name: Build toolchain
      working-directory: ./core/release
      env:
        CC: ${{ runner.os == 'Linux' && 'ccache gcc' || '' }}
        CXX: ${{ runner.os == 'Linux' && 'ccache g++' || '' }}
      run: ${{ matrix.deploy_script }}

    # ============================================
    # Rebuild Libraries (non-bootstrap platforms)
    # ============================================

    - name: Rebuild libraries (Linux ARM64)
      if: matrix.platform == 'linux-arm64'
      working-directory: ./core/compiler
      run: |
        chmod +x update_version_arm.sh
        ./update_version_arm.sh

    - name: Rebuild libraries (macOS ARM64)
      if: matrix.platform == 'macos-arm64'
      working-directory: ./core/compiler
      run: |
        chmod +x update_version_arm.sh
        ./update_version_arm.sh

    - name: Rebuild libraries (Windows)
      if: runner.os == 'Windows' && matrix.platform != 'windows-arm64'
      working-directory: ./core/compiler
      shell: bash
      run: |
        OBC="../release/${{ matrix.arch == 'ARM64' && 'deploy-arm64' || 'deploy-x64' }}/bin/obc.exe"
        if [ ! -f "$OBC" ]; then
          echo "Compiler not found at $OBC, skipping lib rebuild"
          exit 0
        fi

        echo "Rebuilding libraries with $OBC..."
        $OBC -src lib_src/gen_collect.obs -lib ../lib/lang -tar lib -opt s3 -dest ../lib/gen_collect.obl -strict
        $OBC -src lib_src/json_stream.obs -lib gen_collect -tar lib -opt s3 -dest ../lib/json_stream.obl
        $OBC -src lib_src/cipher.obs -tar lib -opt s3 -dest ../lib/cipher.obl
        $OBC -src lib_src/json.obs -lib gen_collect -tar lib -opt s3 -dest ../lib/json.obl
        $OBC -src lib_src/opencv.obs -lib cipher,json -tar lib -opt s3 -dest ../lib/opencv.obl
        $OBC -src lib_src/onnx.obs -lib opencv,cipher,json -tar lib -opt s3 -dest ../lib/onnx.obl
        $OBC -src lib_src/lame.obs -tar lib -opt s3 -dest ../lib/lame.obl
        $OBC -src lib_src/diags.obs -lib gen_collect -tar lib -opt s3 -dest ../lib/diags.obl
        $OBC -src lib_src/xml.obs -lib gen_collect -tar lib -opt s3 -dest ../lib/xml.obl
        $OBC -src lib_src/regex.obs -lib gen_collect -tar lib -opt s3 -dest ../lib/regex.obl
        $OBC -src lib_src/csv.obs -tar lib -lib gen_collect -opt s3 -dest ../lib/csv.obl
        $OBC -src lib_src/ml.obs -lib gen_collect,csv -tar lib -opt s3 -dest ../lib/ml.obl
        $OBC -src lib_src/nlp.obs -lib gen_collect -tar lib -opt s3 -dest ../lib/nlp.obl
        $OBC -src lib_src/net_common.obs,lib_src/net.obs,lib_src/net_secure.obs -tar lib -lib gen_collect,cipher -opt s3 -dest ../lib/net.obl
        $OBC -src lib_src/net_server.obs -tar lib -lib net,json,gen_collect,cipher -opt s3 -dest ../lib/net_server.obl
        $OBC -src lib_src/json_rpc.obs -tar lib -lib json,net -opt s3 -dest ../lib/json_rpc.obl
        $OBC -src lib_src/misc.obs -lib gen_collect,net,json -tar lib -opt s3 -dest ../lib/misc.obl
        $OBC -src lib_src/rss.obs -tar lib -lib xml,gen_collect,net,cipher -opt s3 -dest ../lib/rss.obl
        $OBC -src lib_src/query.obs -tar lib -lib net,regex,csv,xml,json,misc -opt s3 -dest ../lib/query.obl
        $OBC -src lib_src/odbc.obs -lib gen_collect -tar lib -opt s3 -dest ../lib/odbc.obl
        $OBC -src lib_src/openai.obs -lib json,net,net_server,cipher,misc -tar lib -opt s3 -dest ../lib/openai.obl
        $OBC -src lib_src/gemini.obs -lib misc,json,net,net_server,cipher -tar lib -opt s3 -dest ../lib/gemini.obl
        $OBC -src lib_src/ollama.obs -lib net,json,cipher,misc -tar lib -opt s3 -dest ../lib/ollama.obl
        $OBC -src lib_src/sdl2.obs -tar lib -dest ../lib/sdl2.obl
        $OBC -src lib_src/sdl_game.obs -lib gen_collect,json,sdl2 -tar lib -dest ../lib/sdl_game.obl
        echo "Libraries rebuilt successfully"

    - name: Update deploy with rebuilt libraries
      if: matrix.platform != 'linux-x64' && matrix.platform != 'windows-arm64'
      shell: bash
      working-directory: ./core/release
      run: |
        if [ -d "deploy-${{ matrix.arch }}" ]; then
          DEPLOY_LIB="deploy-${{ matrix.arch }}/lib"
        elif [ -d "deploy" ]; then
          DEPLOY_LIB="deploy/lib"
        else
          echo "Deploy directory not found, skipping lib copy"
          exit 0
        fi
        echo "Copying rebuilt libraries to $DEPLOY_LIB..."
        cp ../lib/*.obl "$DEPLOY_LIB/"
        echo "Done"

    - name: Show ccache stats
      if: runner.os != 'Windows'
      run: ccache --show-stats

    # ============================================
    # Determine Deploy Directory
    # ============================================

    - name: Set deploy directory
      id: deploy-dir
      shell: bash
      working-directory: ./core/release
      run: |
        if [ -d "deploy-${{ matrix.arch }}" ]; then
          echo "dir=deploy-${{ matrix.arch }}" >> $GITHUB_OUTPUT
        elif [ -d "deploy" ]; then
          echo "dir=deploy" >> $GITHUB_OUTPUT
        else
          echo "ERROR: Deploy directory not found"
          ls -la
          exit 1
        fi

    # ============================================
    # Test Suite
    # Note: Windows ARM64 is cross-compiled and cannot run tests on x64 runner
    # ============================================

    - name: Skip tests (cross-compiled platform)
      if: matrix.platform == 'windows-arm64'
      shell: bash
      run: |
        echo "Tests skipped for Windows ARM64"
        echo "This platform is cross-compiled on x64 runner"
        echo "ARM64 binaries cannot execute on x64 hardware"
        echo "Build verification only - no test execution"

    - name: Compile tests
      if: matrix.platform != 'windows-arm64'
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          OBC="./obc.exe"
        else
          OBC="./obc"
          chmod +x obc obr obd obi 2>/dev/null || true
        fi

        # Verify compiler exists
        if [ ! -f "$OBC" ]; then
          echo "ERROR: Compiler not found: $OBC"
          ls -la
          exit 1
        fi

        # Verify library directory
        LIB_DIR="../lib"
        if [ ! -d "$LIB_DIR" ]; then
          echo "ERROR: Library directory not found: $LIB_DIR"
          exit 1
        fi

        echo "Compiler found: $OBC"
        echo "Library directory: $LIB_DIR"

        # Set library path for macOS
        if [ "${{ runner.os }}" = "macOS" ]; then
          export DYLD_LIBRARY_PATH="$(pwd)/../lib:$DYLD_LIBRARY_PATH"
          echo "Set DYLD_LIBRARY_PATH for macOS"
        fi

        echo "Testing basic compilation..."
        echo "Working directory: $(pwd)"
        ls -la "$LIB_DIR" | head -20

        # Basic tests for all platforms
        $OBC -lib cipher,net,xml,json -src ../../../../programs/deploy/hello_0.obs || exit 1
        $OBC -lib cipher,net,xml,json -src ../../../../programs/deploy/functions_5.obs || exit 1
        $OBC -lib cipher,net,xml,json -src ../../../../programs/deploy/json_3.obs || exit 1
        $OBC -lib cipher,net,xml,json -src ../../../../programs/deploy/xml_2.obs || exit 1

        echo "Basic tests compiled successfully"

        # Extended tests for Linux x64 only
        if [ "${{ matrix.platform }}" = "linux-x64" ]; then
          echo "Compiling extended tests..."
          $OBC -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/calc_life_10.obs || exit 1
          $OBC -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/closure_19.obs || exit 1
          $OBC -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/encrypt_7.obs || exit 1
          $OBC -lib cipher,net,odbc,rss,regex,misc,xml,query,json,csv -src ../../../../programs/deploy/fs_query_12.obs || exit 1
          $OBC -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/lambda_17.obs || exit 1
          $OBC -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/regex_4.obs || exit 1
          $OBC -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/threads_6.obs || exit 1
          echo "Extended tests compiled successfully"
        fi

    - name: Run tests
      if: matrix.platform != 'windows-arm64'
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          OBR="./obr.exe"
        else
          OBR="./obr"
        fi

        # Basic tests
        $OBR ../../../../programs/deploy/hello_0.obe
        $OBR ../../../../programs/deploy/functions_5.obe
        $OBR ../../../../programs/deploy/json_3.obe
        $OBR ../../../../programs/deploy/xml_2.obe

        # Extended tests for Linux x64
        if [ "${{ matrix.platform }}" = "linux-x64" ]; then
          $OBR ../../../../programs/deploy/calc_life_10.obe
          $OBR ../../../../programs/deploy/closure_19.obe
          $OBR ../../../../programs/deploy/encrypt_7.obe
          $OBR ../../../../programs/deploy/fs_query_12.obe
          $OBR ../../../../programs/deploy/lambda_17.obe
          $OBR ../../../../programs/deploy/regex_4.obe
          # Threading test can be sensitive to CI runner timing; retry up to 3 times
          for attempt in 1 2 3; do
            if $OBR ../../../../programs/deploy/threads_6.obe; then
              break
            fi
            if [ $attempt -eq 3 ]; then
              echo "threads_6.obe failed after 3 attempts"
              exit 1
            fi
            echo "threads_6.obe attempt $attempt failed, retrying..."
            sleep 2
          done
        fi

    # ============================================
    # Regression Tests
    # ============================================

    - name: Run regression tests (POSIX)
      if: runner.os != 'Windows' && matrix.platform != 'windows-arm64'
      working-directory: ./programs/regression
      run: |
        chmod +x run_regression.sh
        ARCH="${{ matrix.arch }}"
        echo "Running regression tests for architecture: $ARCH"
        ./run_regression.sh $ARCH

    - name: Run regression tests (Windows)
      if: runner.os == 'Windows' && matrix.platform != 'windows-arm64'
      working-directory: ./programs/regression
      shell: cmd
      run: run_regression.cmd ${{ matrix.arch }}

    - name: Run debugger tests (POSIX)
      if: runner.os != 'Windows' && matrix.platform != 'windows-arm64'
      working-directory: ./programs/regression
      run: |
        chmod +x run_debugger_tests.sh
        ARCH="${{ matrix.arch }}"
        echo "Running debugger tests for architecture: $ARCH"
        ./run_debugger_tests.sh $ARCH

    - name: Run debugger tests (Windows)
      if: runner.os == 'Windows' && matrix.platform != 'windows-arm64'
      working-directory: ./programs/regression
      shell: cmd
      run: run_debugger_tests.cmd ${{ matrix.arch }}

    # ============================================
    # API Documentation (Linux x64 only)
    # ============================================

    - name: Generate API documentation
      if: matrix.platform == 'linux-x64'
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      run: |
        mkdir -p ../../../../docs/api
        ./obc -src ../../../lib/code_doc/doc_html.obs,../../../lib/code_doc/doc_parser.obs \
          -lib cipher,json,xml,misc,net -dest code_doc.obe

        ./obr code_doc.obe \
          ../../../lib/code_doc/templates \
          ${{ github.ref_type == 'tag' && github.ref_name || '0.0.0' }} \
          ../../../compiler/lib_src/lang.obs \
          ../../../compiler/lib_src/regex.obs \
          ../../../compiler/lib_src/json_stream.obs \
          ../../../compiler/lib_src/json.obs \
          ../../../compiler/lib_src/xml.obs \
          ../../../compiler/lib_src/cipher.obs \
          ../../../compiler/lib_src/odbc.obs \
          ../../../compiler/lib_src/csv.obs \
          ../../../compiler/lib_src/query.obs \
          ../../../compiler/lib_src/sdl2.obs \
          ../../../compiler/lib_src/sdl_game.obs \
          ../../../compiler/lib_src/gen_collect.obs \
          ../../../compiler/lib_src/net_common.obs \
          ../../../compiler/lib_src/net.obs \
          ../../../compiler/lib_src/net_secure.obs \
          ../../../compiler/lib_src/net_server.obs \
          ../../../compiler/lib_src/rss.obs \
          ../../../compiler/lib_src/misc.obs \
          ../../../compiler/lib_src/diags.obs \
          ../../../compiler/lib_src/ml.obs \
          ../../../compiler/lib_src/openai.obs \
          ../../../compiler/lib_src/gemini.obs \
          ../../../compiler/lib_src/ollama.obs \
          ../../../compiler/lib_src/json_rpc.obs \
          ../../../compiler/lib_src/opencv.obs \
          ../../../compiler/lib_src/onnx.obs \
          ../../../compiler/lib_src/nlp.obs \
          ../../../compiler/lib_src/lame.obs

    - name: Package API documentation
      if: matrix.platform == 'linux-x64'
      working-directory: ./docs
      run: |
        zip -r api.zip api/

    - name: Upload API documentation
      if: matrix.platform == 'linux-x64'
      uses: actions/upload-artifact@v6
      with:
        name: api-docs
        path: docs/api.zip
        retention-days: 7

    - name: Clean up signing keychain
      if: always() && runner.os == 'macOS'
      run: |
        if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
        fi

    # ============================================
    # Upload Build Artifacts
    # ============================================

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: objeck-${{ matrix.platform }}
        path: |
          core/release/${{ steps.deploy-dir.outputs.dir }}/bin/*
          core/release/${{ steps.deploy-dir.outputs.dir }}/lib/*
        retention-days: 7

  # ============================================
  # Build Status Summary
  # ============================================

  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ All platform builds succeeded"
            exit 0
          else
            echo "❌ Some platform builds failed"
            exit 1
          fi
