name: Secret Scan

# Scan the repository for committed secrets (API keys, tokens, credentials).
# Runs on every push and pull request, and on a weekly schedule to catch
# anything that slipped through.

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so historical leaks are detected

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
