name: C/C++ CI

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows MSVC build (primary platform)
          - os: windows-latest
            arch: x64
            deploy_script: deploy_windows.cmd x64
            shell: cmd

          # Note: Linux, macOS, and MSYS2 builds are supported but not currently
          # CI-tested due to environment-specific issues that require local debugging.
          # To test these platforms locally:
          #   - Linux: ./deploy_posix.sh x64
          #   - macOS ARM64: ./deploy_macos_arm64.sh
          #   - MSYS2: ./deploy_msys2-ucrt.sh

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
    - uses: actions/checkout@v4

    # Setup MSYS2 (for MSYS2 builds)
    - name: Setup MSYS2
      if: matrix.msys != ''
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msys }}
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-mbedtls
          mingw-w64-ucrt-x86_64-SDL2
          mingw-w64-ucrt-x86_64-SDL2_ttf
          mingw-w64-ucrt-x86_64-SDL2_mixer
          mingw-w64-ucrt-x86_64-SDL2_image
          mingw-w64-ucrt-x86_64-unixodbc
          mingw-w64-ucrt-x86_64-eigen3
          mingw-w64-ucrt-x86_64-pkgconf
          make
          unzip

    # Cache for Linux APT packages
    - name: Cache APT packages (Linux)
      if: runner.os == 'Linux'
      uses: actions/cache@v4
      with:
        path: |
          /var/cache/apt/archives
          /var/lib/apt/lists
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/c-cpp.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    # Cache for macOS Homebrew
    - name: Cache Homebrew (macOS)
      if: runner.os == 'macOS'
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/Homebrew
          /usr/local/Cellar
          /opt/homebrew/Cellar
        key: ${{ runner.os }}-${{ matrix.arch }}-brew-${{ hashFiles('.github/workflows/c-cpp.yml') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.arch }}-brew-

    # Cache for ccache (all platforms with ccache)
    - name: Cache ccache
      if: runner.os != 'Windows'
      uses: actions/cache@v4
      with:
        path: |
          ~/.ccache
          ~/Library/Caches/ccache
        key: ${{ runner.os }}-${{ matrix.arch }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.arch }}-ccache-

    # Setup ccache for faster compilation
    - name: Setup ccache
      if: runner.os != 'Windows' || matrix.msys != ''
      run: |
        if [ "${{ runner.os }}" = "Linux" ]; then
          sudo apt-get install -y ccache
        elif [ "${{ matrix.msys }}" != "" ]; then
          # ccache for MSYS2
          pacman -S --noconfirm mingw-w64-ucrt-x86_64-ccache
        else
          brew install ccache
        fi
        ccache --max-size=500M
        ccache --set-config=compression=true

    # Linux dependencies
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libopencv-dev libmbedtls-dev unixodbc-dev libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-mixer-dev libreadline-dev libeigen3-dev libmp3lame-dev

    # macOS dependencies
    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      run: |
        brew install opencv mbedtls unixodbc sdl2 sdl2_image sdl2_ttf sdl2_mixer readline eigen lame
        # Cleanup to reduce cache size
        brew cleanup

    # Windows dependencies (Visual Studio is pre-installed)
    - name: Setup Visual Studio (Windows)
      if: runner.os == 'Windows' && matrix.msys == ''
      uses: microsoft/setup-msbuild@v2

    - name: Setup MSVC Environment (Windows)
      if: runner.os == 'Windows' && matrix.msys == ''
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}

    # Build bootstrap (Windows MSVC)
    - name: Build bootstrap (Windows MSVC)
      if: runner.os == 'Windows' && matrix.msys == ''
      working-directory: ./core/compiler
      run: call update_version.cmd

    # Build bootstrap (MSYS2)
    - name: Build bootstrap (MSYS2)
      if: matrix.msys != ''
      working-directory: ./core/compiler
      run: ./update_version.sh

    # Build bootstrap (macOS ARM64)
    - name: Build bootstrap (macOS ARM64)
      if: runner.os == 'macOS' && matrix.arch == 'arm64'
      working-directory: ./core/compiler
      run: ./update_version_arm.sh

    # Build bootstrap (Linux)
    - name: Build bootstrap (Linux)
      if: runner.os == 'Linux'
      working-directory: ./core/compiler
      run: ./update_version.sh

    # Build toolchain with ccache
    - name: Build toolchain
      working-directory: ./core/release
      env:
        CC: ${{ (runner.os != 'Windows' || matrix.msys != '') && 'ccache gcc' || '' }}
        CXX: ${{ (runner.os != 'Windows' || matrix.msys != '') && 'ccache g++' || '' }}
      run: ${{ matrix.deploy_script }}

    # Show ccache statistics
    - name: Show ccache stats
      if: runner.os != 'Windows' || matrix.msys != ''
      run: ccache --show-stats

    # Determine deploy directory
    - name: Set deploy directory
      id: deploy-dir
      shell: bash
      working-directory: ./core/release
      run: |
        if [ "${{ matrix.msys }}" != "" ]; then
          echo "dir=deploy-msys2-ucrt" >> $GITHUB_OUTPUT
        elif [ -d "deploy-${{ matrix.arch }}" ]; then
          echo "dir=deploy-${{ matrix.arch }}" >> $GITHUB_OUTPUT
        elif [ -d "deploy" ]; then
          echo "dir=deploy" >> $GITHUB_OUTPUT
        else
          echo "ERROR: Deploy directory not found"
          ls -la
          exit 1
        fi

    # Compile tests (Linux - full suite)
    - name: Compile tests (Linux)
      if: runner.os == 'Linux'
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      run: |
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/calc_life_10.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/closure_19.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/encrypt_7.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/first_class_18.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,query,json,csv -src ../../../../programs/deploy/fs_query_12.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/functions_5.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/hello_0.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/http_xml_regex_8.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/json_3.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/lambda_17.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/regex_4.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/rss_https_xml_15.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/serial_14.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/threads_6.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/visitor_20.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/loops_19.obs
        ./obc -lib cipher,net,odbc,rss,regex,misc,xml,json -src ../../../../programs/deploy/xml_2.obs

    # Compile tests (macOS - basic suite)
    - name: Compile tests (macOS)
      if: runner.os == 'macOS'
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      run: |
        ./obc -lib cipher,net,xml,json -src ../../../../programs/deploy/hello_0.obs
        ./obc -lib cipher,net,xml,json -src ../../../../programs/deploy/functions_5.obs
        ./obc -lib cipher,net,xml,json -src ../../../../programs/deploy/json_3.obs
        ./obc -lib cipher,net,xml,json -src ../../../../programs/deploy/xml_2.obs

    # Compile tests (Windows MSVC)
    - name: Compile tests (Windows MSVC)
      if: runner.os == 'Windows' && matrix.msys == ''
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      shell: cmd
      run: |
        obc.exe -lib cipher,net,xml,json -src ../../../../programs/deploy/hello_0.obs
        obc.exe -lib cipher,net,xml,json -src ../../../../programs/deploy/functions_5.obs
        obc.exe -lib cipher,net,xml,json -src ../../../../programs/deploy/json_3.obs
        obc.exe -lib cipher,net,xml,json -src ../../../../programs/deploy/xml_2.obs

    # Compile tests (MSYS2)
    - name: Compile tests (MSYS2)
      if: matrix.msys != ''
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      run: |
        ./obc -lib cipher,net,xml,json -src ../../../../programs/deploy/hello_0.obs
        ./obc -lib cipher,net,xml,json -src ../../../../programs/deploy/functions_5.obs
        ./obc -lib cipher,net,xml,json -src ../../../../programs/deploy/json_3.obs
        ./obc -lib cipher,net,xml,json -src ../../../../programs/deploy/xml_2.obs

    # Run tests (Linux - full suite)
    - name: Run tests (Linux)
      if: runner.os == 'Linux'
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      run: |
        ./obr ../../../../programs/deploy/calc_life_10.obe
        ./obr ../../../../programs/deploy/closure_19.obe
        ./obr ../../../../programs/deploy/encrypt_7.obe
        ./obr ../../../../programs/deploy/first_class_18.obe
        ./obr ../../../../programs/deploy/fs_query_12.obe
        ./obr ../../../../programs/deploy/functions_5.obe
        ./obr ../../../../programs/deploy/hello_0.obe
        ./obr ../../../../programs/deploy/json_3.obe
        ./obr ../../../../programs/deploy/lambda_17.obe
        ./obr ../../../../programs/deploy/regex_4.obe
        ./obr ../../../../programs/deploy/rss_https_xml_15.obe https://www.techmeme.com/feed.xml out.txt
        ./obr ../../../../programs/deploy/serial_14.obe
        ./obr ../../../../programs/deploy/threads_6.obe
        ./obr ../../../../programs/deploy/visitor_20.obe
        ./obr ../../../../programs/deploy/loops_19.obe
        ./obr ../../../../programs/deploy/xml_2.obe

    # Run tests (macOS - basic suite)
    - name: Run tests (macOS)
      if: runner.os == 'macOS'
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      run: |
        ./obr ../../../../programs/deploy/hello_0.obe
        ./obr ../../../../programs/deploy/functions_5.obe
        ./obr ../../../../programs/deploy/json_3.obe
        ./obr ../../../../programs/deploy/xml_2.obe

    # Run tests (MSYS2)
    - name: Run tests (MSYS2)
      if: matrix.msys != ''
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      run: |
        export PATH="/ucrt64/bin:$PATH"
        ./obr ../../../../programs/deploy/hello_0.obe
        ./obr ../../../../programs/deploy/functions_5.obe
        ./obr ../../../../programs/deploy/json_3.obe
        ./obr ../../../../programs/deploy/xml_2.obe

    # Run tests (Windows MSVC)
    - name: Run tests (Windows MSVC)
      if: runner.os == 'Windows' && matrix.msys == ''
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      shell: cmd
      run: |
        obr.exe ../../../../programs/deploy/hello_0.obe
        obr.exe ../../../../programs/deploy/functions_5.obe
        obr.exe ../../../../programs/deploy/json_3.obe
        obr.exe ../../../../programs/deploy/xml_2.obe

    # Run regression tests (POSIX)
    - name: Run regression tests (Linux/macOS/MSYS2)
      if: runner.os != 'Windows' || matrix.msys != ''
      working-directory: ./programs/regression
      run: |
        # Add MSYS2 DLLs to PATH if needed
        if [ "${{ matrix.msys }}" != "" ]; then
          export PATH="/ucrt64/bin:$PATH"
        fi
        chmod +x run_regression.sh
        # Pass deploy directory name for MSYS2
        if [ "${{ matrix.msys }}" != "" ]; then
          ./run_regression.sh msys2-ucrt
        else
          ./run_regression.sh ${{ matrix.arch }}
        fi

    # Run regression tests (Windows MSVC)
    - name: Run regression tests (Windows MSVC)
      if: runner.os == 'Windows' && matrix.msys == ''
      working-directory: ./programs/regression
      shell: cmd
      run: run_regression.cmd ${{ matrix.arch }}

    # Generate API docs (Linux only, once is enough)
    - name: Generate API documentation
      if: runner.os == 'Linux' && matrix.arch == 'x64'
      working-directory: ./core/release/${{ steps.deploy-dir.outputs.dir }}/bin
      run: |
        mkdir -p ../html
        ./obc -src ../../../lib/code_doc/doc_html.obs,../../../lib/code_doc/doc_parser.obs -lib cipher,json,xml,misc,net -dest code_doc.obe
        ./obr code_doc.obe ../../../lib/code_doc/templates 0.0.1 ../../../compiler/lib_src/lang.obs ../../../compiler/lib_src/regex.obs ../../../compiler/lib_src/json.obs ../../../compiler/lib_src/xml.obs ../../../compiler/lib_src/cipher.obs ../../../compiler/lib_src/odbc.obs ../../../compiler/lib_src/csv.obs ../../../compiler/lib_src/query.obs ../../../compiler/lib_src/sdl2.obs ../../../compiler/lib_src/sdl_game.obs ../../../compiler/lib_src/gen_collect.obs ../../../compiler/lib_src/net.obs ../../../compiler/lib_src/rss.obs ../../../compiler/lib_src/misc.obs

    # Upload build artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: objeck-${{ runner.os }}-${{ matrix.arch }}${{ matrix.msys != '' && '-msys2' || '' }}
        path: |
          core/release/${{ steps.deploy-dir.outputs.dir }}/bin/*
          core/release/${{ steps.deploy-dir.outputs.dir }}/lib/*
        retention-days: 7
