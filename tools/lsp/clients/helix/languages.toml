# Objeck language server configuration for Helix
#
# Installation:
#   The install script writes this file to ~/.config/helix/languages.toml
#   with <objeck_server_path> replaced by the self-contained LSP deployment
#   (typically ~/.objeck-lsp/). To install manually, copy this file and
#   replace <objeck_server_path> with your deployment directory.
#
# Prerequisites:
#   - Self-contained LSP deployment at <objeck_server_path>
#     (created by scripts/install.sh or scripts/install.cmd)

[[language]]
name = "objeck"
scope = "source.objeck"
file-types = ["obs"]
roots = ["build.json"]
comment-token = "#"
block-comment-tokens = { start = "#~", end = "~#" }
language-servers = ["objeck-lsp"]

[language-server.objeck-lsp]
command = "<objeck_server_path>/bin/obr"
args = [
    "<objeck_server_path>/objeck_lsp.obe",
    "<objeck_server_path>/objk_apis.json",
    "stdio",
]

[language-server.objeck-lsp.environment]
OBJECK_LIB_PATH = "<objeck_server_path>/lib"
OBJECK_STDIO    = "binary"
